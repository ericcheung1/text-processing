services:
  sentiment:
    image: ghcr.io/ericcheung1/wpaas-sentiment:main
    expose:
      - "8000"
    restart: unless-stopped
  
  keywords:
    image: ghcr.io/ericcheung1/wpaas-keywords:main
    expose:
      - "8000" 
    restart: unless-stopped
 
  caddy:
    image: caddy:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - sentiment
      - keywords
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
